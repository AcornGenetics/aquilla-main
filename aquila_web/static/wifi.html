<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=768, height=1024, initial-scale=1" />
  <title>WiFi Settings</title>
  <link rel="stylesheet" href="/static/styles.css?v=210" />
  <style>
    .wifi-page { padding: 24px 28px; max-width: 680px; }

    .wifi-status-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      border-radius: 12px;
      background: #f0f4f8;
      border: 1px solid #d1d9e0;
      margin-bottom: 24px;
      font-size: 16px;
    }
    .wifi-status-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #9ca3af;
      flex-shrink: 0;
    }
    .wifi-status-dot.connected { background: #22c55e; }
    .wifi-status-label { font-weight: 600; color: #1f2937; }
    .wifi-status-ssid { color: #4b5563; }

    .wifi-section-title {
      font-size: 14px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 0 0 10px;
    }

    .wifi-network-list {
      border: 1px solid #d1d9e0;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .wifi-network-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      cursor: pointer;
      transition: background 0.1s;
    }
    .wifi-network-row:last-child { border-bottom: none; }
    .wifi-network-row:active,
    .wifi-network-row.is-selected { background: #f0f4f8; }

    .wifi-signal-icon { font-size: 18px; flex-shrink: 0; }
    .wifi-network-name { flex: 1; font-size: 16px; color: #1f2937; font-weight: 500; }
    .wifi-network-lock { font-size: 14px; color: #9ca3af; }
    .wifi-network-check { color: #22c55e; font-weight: 700; font-size: 16px; }

    .wifi-connect-form {
      padding: 14px 18px 18px;
      background: #f8fafc;
      border-top: 1px solid #e5e7eb;
      display: none;
    }
    .wifi-connect-form.is-open { display: block; }

    .wifi-password-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    .wifi-password-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #d1d9e0;
      border-radius: 8px;
      font-size: 16px;
    }
    .wifi-show-btn {
      padding: 10px 14px;
      border: 1px solid #d1d9e0;
      border-radius: 8px;
      background: #fff;
      font-size: 15px;
      cursor: pointer;
      color: #4b5563;
    }

    .wifi-connect-btn {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #2563eb;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .wifi-connect-btn:disabled { background: #93c5fd; cursor: default; }

    .wifi-error {
      color: #dc2626;
      font-size: 14px;
      margin-top: 8px;
      display: none;
    }
    .wifi-error.is-visible { display: block; }

    .wifi-spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .wifi-rescan-btn {
      padding: 9px 18px;
      border-radius: 8px;
      border: 1px solid #d1d9e0;
      background: #fff;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      color: #374151;
      margin-bottom: 12px;
    }
    .wifi-rescan-btn:disabled { color: #9ca3af; cursor: default; }

    .wifi-empty {
      padding: 24px;
      text-align: center;
      color: #9ca3af;
      font-size: 15px;
    }
  </style>
</head>
<body class="app-body">
  <div class="app-shell">
    <main class="main run-main">
      <header class="run-header">
        <h1 class="run-header__title">
          <a class="back-icon back-icon--inline" href="/help" aria-label="Back">&#x2039;</a>
          WiFi Settings
        </h1>
        <nav class="run-header__nav">
          <a class="run-nav-link" href="/run">Run</a>
          <a class="run-nav-link" href="/history">History</a>
          <a class="run-nav-link" href="/profiles-page">Profiles</a>
          <a class="help-link" href="/help">
            <span>?</span>
            <span class="help-tooltip">Help</span>
          </a>
          <button class="run-stop-btn" onclick="notifyExitForce()" type="button">Exit GUI</button>
        </nav>
      </header>
      <div class="run-divider"></div>

      <div class="wifi-page">
        <!-- Current connection -->
        <div class="wifi-status-bar" id="wifi-status-bar">
          <div class="wifi-status-dot" id="wifi-dot"></div>
          <span class="wifi-status-label" id="wifi-status-label">Checking...</span>
          <span class="wifi-status-ssid" id="wifi-status-ssid"></span>
        </div>

        <!-- Scan -->
        <button class="wifi-rescan-btn" id="rescan-btn" onclick="doScan()">&#x21BA; Scan for networks</button>

        <p class="wifi-section-title">Available Networks</p>
        <div class="wifi-network-list" id="network-list">
          <div class="wifi-empty" id="network-empty">Press Scan to find networks</div>
        </div>
      </div>
    </main>
  </div>

  <script>
    let selectedRow = null;

    function signalIcon(signal) {
      if (signal >= 75) return "▂▄▆█";
      if (signal >= 50) return "▂▄▆░";
      if (signal >= 25) return "▂▄░░";
      return "▂░░░";
    }

    async function loadStatus() {
      try {
        const r = await fetch("/wifi/status");
        const d = await r.json();
        const dot = document.getElementById("wifi-dot");
        const label = document.getElementById("wifi-status-label");
        const ssid = document.getElementById("wifi-status-ssid");
        if (d.connected) {
          dot.classList.add("connected");
          label.textContent = "Connected";
          ssid.textContent = d.ssid + (d.signal != null ? `  (${d.signal}%)` : "");
        } else {
          dot.classList.remove("connected");
          label.textContent = "Not connected";
          ssid.textContent = "";
        }
      } catch (e) {
        document.getElementById("wifi-status-label").textContent = "Status unavailable";
      }
    }

    async function doScan() {
      const btn = document.getElementById("rescan-btn");
      const list = document.getElementById("network-list");
      const empty = document.getElementById("network-empty");
      btn.disabled = true;
      btn.textContent = "Scanning...";
      list.innerHTML = '<div class="wifi-empty">Scanning — this takes a few seconds...</div>';
      selectedRow = null;
      try {
        const r = await fetch("/wifi/scan");
        const d = await r.json();
        list.innerHTML = "";
        if (!d.networks || d.networks.length === 0) {
          list.innerHTML = '<div class="wifi-empty">No networks found</div>';
          return;
        }
        d.networks.forEach(net => {
          const row = document.createElement("div");
          row.className = "wifi-network-row";
          if (net.in_use) row.classList.add("is-selected");
          row.innerHTML = `
            <span class="wifi-signal-icon">${signalIcon(net.signal)}</span>
            <span class="wifi-network-name">${escHtml(net.ssid)}</span>
            ${net.secured ? '<span class="wifi-network-lock">🔒</span>' : ''}
            ${net.in_use ? '<span class="wifi-network-check">✓</span>' : ''}
          `;
          const form = buildConnectForm(net);
          row.addEventListener("click", () => toggleForm(row, form, net));
          list.appendChild(row);
          list.appendChild(form);
        });
      } catch (e) {
        list.innerHTML = '<div class="wifi-empty">Scan failed — try again</div>';
      } finally {
        btn.disabled = false;
        btn.textContent = "↺ Scan for networks";
        await loadStatus();
      }
    }

    function buildConnectForm(net) {
      const form = document.createElement("div");
      form.className = "wifi-connect-form";
      form.innerHTML = `
        ${net.secured ? `
        <div class="wifi-password-row">
          <input type="password" id="pw-${escId(net.ssid)}" placeholder="Password" autocomplete="off" />
          <button class="wifi-show-btn" type="button" onclick="togglePw('${escId(net.ssid)}', this)">Show</button>
        </div>` : ""}
        <button class="wifi-connect-btn" type="button" onclick="doConnect('${escId(net.ssid)}', ${net.secured})">
          Connect to ${escHtml(net.ssid)}
        </button>
        <div class="wifi-error" id="err-${escId(net.ssid)}"></div>
      `;
      return form;
    }

    function toggleForm(row, form, net) {
      if (selectedRow && selectedRow !== form) {
        selectedRow.classList.remove("is-open");
        selectedRow.previousElementSibling.classList.remove("is-selected");
      }
      const opening = !form.classList.contains("is-open");
      form.classList.toggle("is-open", opening);
      row.classList.toggle("is-selected", opening);
      selectedRow = opening ? form : null;
    }

    function togglePw(id, btn) {
      const input = document.getElementById("pw-" + id);
      if (!input) return;
      const showing = input.type === "text";
      input.type = showing ? "password" : "text";
      btn.textContent = showing ? "Show" : "Hide";
    }

    async function doConnect(ssidId, secured) {
      const pwInput = document.getElementById("pw-" + ssidId);
      const errEl = document.getElementById("err-" + ssidId);
      const btn = errEl.previousElementSibling;
      const ssid = pwInput ? pwInput.closest(".wifi-connect-form").querySelector(".wifi-connect-btn").textContent.replace("Connect to ", "").trim() : ssidId;
      const password = pwInput ? pwInput.value : "";

      errEl.classList.remove("is-visible");
      btn.disabled = true;
      btn.innerHTML = '<span class="wifi-spinner"></span>Connecting...';

      try {
        const r = await fetch("/wifi/connect", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ ssid, password }),
        });
        const d = await r.json();
        if (d.ok) {
          await loadStatus();
          btn.innerHTML = "✓ Connected!";
          btn.style.background = "#16a34a";
        } else {
          errEl.textContent = d.error || "Connection failed — check password";
          errEl.classList.add("is-visible");
          btn.disabled = false;
          btn.innerHTML = `Connect to ${escHtml(ssid)}`;
        }
      } catch (e) {
        errEl.textContent = "Request failed — try again";
        errEl.classList.add("is-visible");
        btn.disabled = false;
        btn.innerHTML = `Connect to ${escHtml(ssid)}`;
      }
    }

    function escHtml(str) {
      return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }
    function escId(str) {
      return String(str).replace(/[^a-zA-Z0-9_-]/g, "_");
    }

    async function notifyExitForce() {
      if (!window.confirm("Exit GUI?")) return;
      try { await fetch("/button/exit/force", { method: "POST" }); } catch {}
    }

    loadStatus();
  </script>
  <script src="/static/keyboard.js?v=13"></script>
  <script src="/static/nav.js?v=1"></script>
</body>
</html>
