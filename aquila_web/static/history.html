<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=768, height=1024, initial-scale=1" />
  <title>Run History</title>
  <link rel="stylesheet" href="static/styles.css?v=72" />
</head>
<body class="app-body">
  <div class="app-shell">
    <main class="main run-main">
      <header class="run-header">
        <h1 class="run-header__title">Run History</h1>
        <nav class="run-header__nav">
          <a class="run-nav-link" href="/run">Run</a>
          <a class="run-nav-link" href="/history">History</a>
          <a class="run-nav-link" href="/profiles-page">Profiles</a>
          <a class="help-link" href="/help">
            <span>?</span>
            <span class="help-tooltip">How to run a test</span>
          </a>
        </nav>
      </header>
      <div class="run-divider"></div>
      <header class="page-header">
        <p class="history-subtitle">Recent runs and outcome summaries.</p>
      </header>
      <div class="profiles-actions">
        <button id="history-clear" class="run-secondary-btn" type="button">Delete</button>
      </div>
      <div class="profiles-table-wrapper">
        <table class="profiles-table">
        <thead>
          <tr>
            <th class="checkbox-cell">
              <input id="history-select-all-checkbox" type="checkbox" />
            </th>
            <th>Date</th>
            <th>Run Name</th>
            <th>Profile</th>
            <th>Result</th>
            <th>Graph</th>
          </tr>
        </thead>
        <tbody id="history-table-body"></tbody>
        </table>
      </div>
    </main>
  </div>
  <script src="static/history.js?v=8"></script>
</body>
</html>
