<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=768, height=1024, initial-scale=1" />
  <title>Edit Profile</title>
  <link rel="stylesheet" href="/static/styles.css?v=85" />
</head>
<body class="app-body">
  <div class="app-shell">
    <main class="main run-main">
      <header class="run-header">
        <h1 class="run-header__title" id="profile-page-title">
          <a class="back-icon back-icon--inline" href="/profiles-page" aria-label="Back">&#x2039;</a>
          Edit Run Profile
        </h1>
        <nav class="run-header__nav">
          <a class="run-nav-link" href="/run">Run</a>
          <a class="run-nav-link" href="/history">History</a>
          <a class="run-nav-link" href="/profiles-page">Profiles</a>
          <a class="help-link" href="/help">
            <span>?</span>
            <span class="help-tooltip">How to run a test</span>
          </a>
        </nav>
      </header>
      <div class="run-divider"></div>
      <div class="profile-form">
        <div class="page-header profile-header">
          <p id="profile-page-subtitle">Update profile settings and steps.</p>
          <button id="toggle-read-view" class="form-action-btn" type="button">Read View</button>
        </div>
        <section class="card profile-edit" id="profile-edit-details">
          <div class="field-grid">
            <div class="field">
              <label for="profile-name">Profile name</label>
              <input id="profile-name" type="text" value="" />
            </div>
            <div class="field">
              <label for="profile-volume">Test Volume uL</label>
              <input id="profile-volume" type="text" value="" />
            </div>
          </div>
          <div class="field-grid">
            <div class="field">
              <label for="profile-fam-label">FAM Label</label>
              <input id="profile-fam-label" type="text" value="FAM" />
            </div>
            <div class="field">
              <label for="profile-rox-label">ROX Label</label>
              <input id="profile-rox-label" type="text" value="ROX" />
            </div>
          </div>
        </section>
        <section class="card profile-summary is-hidden" id="profile-summary">
          <header class="page-header">
            <h2>Profile Summary</h2>
            <p>Read-only overview of every stage and step.</p>
          </header>
          <div id="profile-summary-list" class="profile-summary-list"></div>
        </section>
        <section class="card profile-edit" id="profile-edit-steps">
          <header class="page-header">
            <h2>Profile Steps</h2>
            <p>Define step types, temperatures, and durations.</p>
          </header>
          <div class="profile-steps">
            <div class="stage-controls">
              <div class="field">
                <label for="stage-select">Stage</label>
                <select id="stage-select"></select>
              </div>
            <div class="field">
              <label for="stage-name">Stage Name</label>
              <input id="stage-name" type="text" value="" />
            </div>
            <div class="field">
              <label for="stage-cycles">Stage Cycles</label>
              <input id="stage-cycles" type="number" value="1" min="1" />
            </div>
            <div class="stage-actions">
              <button id="add-stage" class="form-action-btn form-action-btn--primary" type="button">Add Stage</button>
              <button id="delete-stage" class="form-action-btn" type="button">Delete Stage</button>
            </div>
            </div>
            <div id="stage-steps"></div>
            <div class="button-row">
              <button id="add-step" class="form-action-btn" type="button">Add Step</button>
            </div>
          </div>
        </section>
        <div class="button-row profile-edit" id="profile-edit-actions">
          <button id="save-profile-button" class="form-action-btn form-action-btn--primary" type="button">Save profile</button>
          <a class="form-action-btn" href="/profiles-page">Cancel</a>
        </div>
        <p id="save-status" class="page-header"></p>
      </div>
    </main>
  </div>
  <script src="/static/profiles/edit.js?v=11"></script>
  <script src="/static/keyboard.js?v=5"></script>
</body>
</html>
