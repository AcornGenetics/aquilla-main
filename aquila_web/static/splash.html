<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aquila — Starting</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      margin-bottom: 64px;
    }

    .logo-wrap svg {
      width: 96px;
      height: 108px;
    }

    .brand {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #1a1a1a;
    }

    .status {
      font-size: 13px;
      color: #888;
      letter-spacing: 0.04em;
      margin-top: -16px;
      margin-bottom: 32px;
      min-height: 18px;
    }

    .bar-track {
      width: 220px;
      height: 4px;
      background: #e8e8e8;
      border-radius: 2px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      background: #c2f282;
      border-radius: 2px;
      transition: width 0.6s ease;
    }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <svg width="62" height="70" viewBox="0 0 62 70" fill="none" xmlns="http://www.w3.org/2000/svg">
      <g clip-path="url(#clip0)">
        <path d="M18.4694 30.42H6.08447V53.0905C6.08447 55.6267 8.11341 57.6533 10.6472 57.6533H14.7756C15.7172 57.6533 16.6589 58.0149 17.3822 58.7406C18.1055 59.4638 18.4694 60.4055 18.4694 61.3472V65.3299C18.4694 67.8661 20.4984 69.8927 23.0322 69.8927H38.6766C41.2128 69.8927 43.2394 67.8637 43.2394 65.3299V61.056C43.2394 60.1143 43.601 59.2454 44.2539 58.5926C44.9067 57.9398 45.7756 57.5781 46.6444 57.5781H50.9911C53.5273 57.5781 55.5539 55.5492 55.5539 53.0154V30.3448H43.1689V54.3915C43.1689 55.2604 42.8073 56.0564 42.2273 56.6365C41.6472 57.2165 40.8512 57.5781 39.9823 57.5781H21.2945C20.4984 57.5781 19.7728 57.2893 19.2655 56.7093C18.6855 56.1292 18.3966 55.406 18.3966 54.6099V30.3448L18.4694 30.4176V30.42Z" fill="#c2f282"/>
        <path d="M57.2916 12.385H40.4167C39.5478 12.385 38.7518 12.0233 38.0989 11.4433C37.4461 10.7905 37.0845 9.9944 37.0845 9.12552V0H29.2623C26.7261 0 24.6995 2.02894 24.6995 4.56276V9.9216C24.6995 10.356 24.4811 10.7905 24.1923 11.1521L23.8306 11.5138C23.2506 12.0938 22.5273 12.3826 21.7312 12.3826H4.56276C2.02659 12.3826 0 14.4116 0 16.8726V24.5492H24.7699V15.9309C24.7699 14.9892 25.1316 14.0476 25.8572 13.3947C26.51 12.7419 27.3789 12.3803 28.3206 12.3803H33.8978C34.7667 12.3803 35.5628 12.7419 36.2156 13.3219C36.8684 13.9748 37.2301 14.7709 37.2301 15.6397V24.5492H62V16.8726C62 14.4092 59.9711 12.3826 57.4372 12.3826H57.2916V12.385Z" fill="#c2f282"/>
      </g>
      <defs>
        <clipPath id="clip0">
          <rect width="62" height="69.895" fill="white"/>
        </clipPath>
      </defs>
    </svg>
    <span class="brand">SENTRI</span>
  </div>

  <p class="status" id="status">Starting up…</p>

  <div class="bar-track">
    <div class="bar-fill" id="bar"></div>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const bar = document.getElementById('bar');

    // Fake progress: fills to 88% over ~28 seconds (matches observed boot time),
    // then holds until the backend actually responds.
    const PHASES = [
      { pct: 15,  ms: 5000,  label: 'Starting up…' },
      { pct: 40,  ms: 15000, label: 'Loading services…' },
      { pct: 70,  ms: 20000, label: 'Connecting…' },
      { pct: 88,  ms: 20000, label: 'Almost ready…' },
    ];

    let pct = 0;
    function setBar(p) { pct = p; bar.style.width = p + '%'; }

    function runPhases(phases) {
      if (!phases.length) return;
      const [{ pct: target, ms, label }, ...rest] = phases;
      statusEl.textContent = label;
      const start = performance.now();
      const from = pct;
      function step(now) {
        const t = Math.min((now - start) / ms, 1);
        setBar(from + (target - from) * t);
        if (t < 1) requestAnimationFrame(step);
        else runPhases(rest);
      }
      requestAnimationFrame(step);
    }

    runPhases(PHASES);

    // Poll backend — independent of fake progress
    let attempts = 0;
    const MAX_WAIT = 120;

    function poll() {
      fetch('http://localhost:8090/health', { cache: 'no-store' })
        .then(r => {
          if (r.ok) {
            statusEl.textContent = 'Ready';
            bar.style.transition = 'width 0.4s ease';
            setBar(100);
            setTimeout(() => { window.location.href = 'http://localhost:8090'; }, 450);
          } else { retry(); }
        })
        .catch(() => retry());
    }

    function retry() {
      attempts++;
      if (attempts >= MAX_WAIT) {
        statusEl.textContent = 'Taking longer than expected…';
        setTimeout(poll, 3000);
        return;
      }
      setTimeout(poll, 1000);
    }

    poll();
  </script>
</body>
</html>
