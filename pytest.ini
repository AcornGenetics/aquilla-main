[pytest]
testpaths = tests unit_tests
markers =
    unit: no hardware, no network — runs on any machine
    contract: FastAPI TestClient only — no hardware
    state: state machine safety rules
    integration: full simulated run — requires DEV_SIMULATE=1
    e2e: Playwright browser tests — requires running frontend
    hardware: requires real Pi hardware — skipped in CI
    slow: takes more than 5 seconds
filterwarnings =
    ignore::DeprecationWarning
