name: promote-images

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: Source image tag to promote
        required: true
        type: string
      target_tag:
        description: Target ring tag (dev/canary/stable/prod)
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Set lowercase repo
        run: echo "REPO_LOWER=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag and push ring images
        run: |
          set -euo pipefail
          repo="ghcr.io/${{ env.REPO_LOWER }}"
          source_tag="${{ inputs.source_tag }}"
          target_tag="${{ inputs.target_tag }}"

          api_source="${repo}-api:${source_tag}"
          api_target="${repo}-api:${target_tag}"
          ui_source="${repo}-ui:${source_tag}"
          ui_target="${repo}-ui:${target_tag}"

          docker pull "$api_source"
          docker pull "$ui_source"

          docker tag "$api_source" "$api_target"
          docker tag "$ui_source" "$ui_target"

          docker push "$api_target"
          docker push "$ui_target"
