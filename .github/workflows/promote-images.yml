name: promote-images

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: Source image tag to promote
        required: true
        type: string
      target_tag:
        description: Target ring tag (sandbox/dev/pilot/prod)
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Set lowercase repo
        run: echo "REPO_LOWER=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Retag and push ring images
        run: |
          set -euo pipefail
          repo="ghcr.io/${{ env.REPO_LOWER }}"
          source_tag="${{ inputs.source_tag }}"
          target_tag="${{ inputs.target_tag }}"

          docker buildx imagetools create \
            --tag "${repo}-api:${target_tag}" \
            "${repo}-api:${source_tag}"

          docker buildx imagetools create \
            --tag "${repo}-ui:${target_tag}" \
            "${repo}-ui:${source_tag}"
