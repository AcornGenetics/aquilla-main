name: build-and-push-images

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ring_tag:
        description: Optional ring tag to publish (dev/pilot/prod)
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase repo
        run: echo "REPO_LOWER=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}-api:latest
            ghcr.io/${{ env.REPO_LOWER }}-api:${{ github.sha }}
            ${{ inputs.ring_tag && format('ghcr.io/{0}-api:{1}', env.REPO_LOWER, inputs.ring_tag) || '' }}

      - name: Build and push UI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.ui
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}-ui:latest
            ghcr.io/${{ env.REPO_LOWER }}-ui:${{ github.sha }}
            ${{ inputs.ring_tag && format('ghcr.io/{0}-ui:{1}', env.REPO_LOWER, inputs.ring_tag) || '' }}
