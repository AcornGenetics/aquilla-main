name: build-and-push-images

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: "What to do"
        required: true
        default: cut-version
        type: choice
        options:
          - cut-version
          - assign-ring
      version:
        description: "cut-version: exact version (blank = auto patch-bump). assign-ring: version to deploy."
        required: false
        type: string
      ring:
        description: "assign-ring only: target ring"
        required: false
        type: choice
        options:
          - dev
          - pilot
          - prod

permissions:
  contents: write
  packages: write

# Serialize runs so two releases can't mint the same version concurrently.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set build vars
        run: |
          echo "REPO_LOWER=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Compute version
        id: ver
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'cut-version'
        run: |
          set -euo pipefail
          latest=$(git tag --list 'v*' --sort=-v:refname | head -1 | sed 's/^v//')
          existing=$(git tag --list 'v*' | sed 's/^v//' | paste -sd, -)
          if [ -z "$latest" ] && [ -z "${{ inputs.version }}" ]; then
            echo "::error::No v* tags exist yet — run the backfill (#233) first, or provide an exact version."
            exit 1
          fi
          next=$(python3 -m aq_lib.version_tool next --latest "${latest:-0.0.0}" --custom "${{ inputs.version }}" --existing "$existing") \
            || { echo "::error::version computation failed (duplicate or invalid version)"; exit 1; }
          echo "version=$next" >> "$GITHUB_OUTPUT"
          {
            echo "## Cut version \`v$next\`"
            echo "- bump: ${{ inputs.version && 'custom' || 'auto patch' }}"
            echo "- images tagged: \`$next\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set up QEMU
        if: github.event_name == 'push' || inputs.action == 'cut-version'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: github.event_name == 'push' || inputs.action == 'cut-version' || inputs.action == 'assign-ring'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' || inputs.action == 'cut-version' || inputs.action == 'assign-ring'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Assign version to ring
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'assign-ring'
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          ring="${{ inputs.ring }}"
          if [ -z "$version" ] || [ -z "$ring" ]; then
            echo "::error::assign-ring requires both 'version' and 'ring'."
            exit 1
          fi
          api="ghcr.io/${REPO_LOWER}-api"
          ui="ghcr.io/${REPO_LOWER}-ui"
          # image-exists gate: probe the registry for the :<version> image
          if docker buildx imagetools inspect "${api}:${version}" >/dev/null 2>&1; then
            existing="$version"
          else
            existing=""
          fi
          python3 -m aq_lib.version_tool assign --version "$version" --ring "$ring" --existing "$existing" \
            || { echo "::error::ring assignment refused (no image for that version, or invalid ring)"; exit 1; }
          # retag both images by digest — no rebuild, baked AQ_APP_VERSION preserved
          docker buildx imagetools create --tag "${api}:${ring}" "${api}:${version}"
          docker buildx imagetools create --tag "${ui}:${ring}" "${ui}:${version}"
          echo "## Assigned \`$version\` -> \`$ring\` (api + ui)" >> "$GITHUB_STEP_SUMMARY"

      - name: Build and push backend image
        if: github.event_name == 'push' || inputs.action == 'cut-version'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            AQ_APP_VERSION=${{ steps.ver.outputs.version || env.SHORT_SHA }}
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}-api:latest
            ghcr.io/${{ env.REPO_LOWER }}-api:${{ github.sha }}
            ${{ steps.ver.outputs.version && format('ghcr.io/{0}-api:{1}', env.REPO_LOWER, steps.ver.outputs.version) || '' }}

      - name: Build and push UI image
        if: github.event_name == 'push' || inputs.action == 'cut-version'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.ui
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}-ui:latest
            ghcr.io/${{ env.REPO_LOWER }}-ui:${{ github.sha }}
            ${{ steps.ver.outputs.version && format('ghcr.io/{0}-ui:{1}', env.REPO_LOWER, steps.ver.outputs.version) || '' }}

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'cut-version'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          v="v${{ steps.ver.outputs.version }}"
          gh release create "$v" \
            --title "$v" \
            --notes "Release $v — image tag \`${{ steps.ver.outputs.version }}\` (commit ${{ github.sha }})." \
            --target "${{ github.sha }}"
