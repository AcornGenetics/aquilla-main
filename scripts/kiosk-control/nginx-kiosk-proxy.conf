# nginx-kiosk-proxy.conf
# Add this location block to the server{} block in your UI container's nginx config.
#
# It proxies POST /kiosk-control/exit and /kiosk-control/start to the
# host-side kiosk-control service so the frontend JS never has to know the
# host IP or port — it just calls a relative URL.
#
# Replace "host.docker.internal:9191" with the actual host IP if needed
# (e.g. 172.17.0.1:9191 when host.docker.internal is unavailable).

location /kiosk-control/ {
    # Only allow POST; reject everything else at the proxy layer
    limit_except POST {
        deny all;
    }

    proxy_pass         http://host.docker.internal:9191/;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_read_timeout 10s;
    proxy_connect_timeout 5s;
}
