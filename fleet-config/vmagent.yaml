global:
  scrape_interval: 15s

scrape_configs:
  - job_name: node-exporter
    static_configs:
      - targets: ["127.0.0.1:9100"]

remote_write:
  - url: https://prometheus-prod-56-prod-us-east-2.grafana.net/api/prom/push
    basic_auth:
      username: "REPLACE_GRAFANA_METRICS_USER"
      password: "REPLACE_GRAFANA_METRICS_TOKEN"
