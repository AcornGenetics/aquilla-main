services:
  backend:
    image: ghcr.io/${GHCR_REPO:-acorngenetics/aquilla-main}-api:${IMAGE_TAG}
    env_file: ${DEVICE_ENV_FILE:-/opt/aquila/config/device.env}
    container_name: aquila-backend
    ports:
      - "8090:8090"
    environment:
      DATA_DIR: "/opt/aquila"
      PROFILE_DIR: "/opt/aquila/profiles"
      RESULTS_PATH: "/opt/aquila/results/results.json"
      CONFIG_DIR: "/opt/aquila/config"
      KIOSK_CONTROL_URL: "http://host.docker.internal:9191"
      WATCHTOWER_URL: "http://aquila-watchtower:8080"
      RUNNING_IMAGE_DIGEST: "${RUNNING_IMAGE_DIGEST:-}"
      RUNNING_IMAGE_DIGEST_UI: "${RUNNING_IMAGE_DIGEST_UI:-}"
    volumes:
      - /opt/aquila/results:/opt/aquila/results
      - /opt/aquila/logs:/opt/aquila/logs
      - /opt/aquila/profiles:/opt/aquila/profiles
      - /opt/aquila/config:/opt/aquila/config
      # Mount the whole fleet dir (not just .env) so the OTA reboot sentinel
      # /opt/fleet/last_update.json is host-backed and survives the Watchtower
      # container swap. See specs/backend/spec_ota_sentinel_persistent_volume.md.
      - /opt/fleet:/opt/fleet
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0"
      - "/dev/i2c-1:/dev/i2c-1"
      - "/dev/spidev0.0:/dev/spidev0.0"
      - "/dev/spidev0.1:/dev/spidev0.1"
      - "/dev/gpiomem:/dev/gpiomem"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    privileged: true
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1024M

  app:
    image: ghcr.io/${GHCR_REPO:-acorngenetics/aquilla-main}-api:${IMAGE_TAG}
    env_file: ${DEVICE_ENV_FILE:-/opt/aquila/config/device.env}
    container_name: aquila-app
    hostname: ${DEVICE_HOSTNAME}
    command: ["python3", "application.py"]
    environment:
      DATA_DIR: "/opt/aquila"
      PROFILE_DIR: "/opt/aquila/profiles"
      RESULTS_PATH: "/opt/aquila/results/results.json"
      CONFIG_DIR: "/opt/aquila/config"
      BACKEND_URL: "http://aquila-backend:8090"
      KIOSK_CONTROL_URL: "http://host.docker.internal:9191"
    volumes:
      - /opt/aquila/results:/opt/aquila/results
      - /opt/aquila/logs:/opt/aquila/logs
      - /opt/aquila/profiles:/opt/aquila/profiles
      - /opt/aquila/config:/opt/aquila/config
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0"
      - "/dev/i2c-1:/dev/i2c-1"
      - "/dev/spidev0.0:/dev/spidev0.0"
      - "/dev/spidev0.1:/dev/spidev0.1"
      - "/dev/gpiomem:/dev/gpiomem"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    pid: host
    privileged: true
    healthcheck:
      disable: true
    depends_on:
      - backend
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M

  ui:
    image: ghcr.io/${GHCR_REPO:-acorngenetics/aquilla-main}-ui:${IMAGE_TAG}
    env_file: ${DEVICE_ENV_FILE:-/opt/aquila/config/device.env}
    container_name: aquila-ui
    ports:
      - "8080:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  watchtower:
    image: nickfedor/watchtower
    container_name: aquila-watchtower
    env_file: ${DEVICE_ENV_FILE:-/opt/aquila/config/device.env}
    ports:
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json:ro
    environment:
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_HTTP_API_UPDATE: "true"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_CONFIG_FILE: "/config.json"
    command: --label-enable --http-api-update --cleanup --api-version 1.54
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
