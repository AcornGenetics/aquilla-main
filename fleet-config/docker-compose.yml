services:
  backend:
    image: ghcr.io/${GHCR_REPO:-acorngenetics/aquilla-main}-api:${IMAGE_TAG}
    env_file: ${DEVICE_ENV_FILE:-/opt/aquila/config/device.env}
    container_name: aquila-backend
    # Forward DNS to the host-side resolver (dnsmasq on the fleet_default bridge
    # gateway) so name resolution follows the host instead of the stale upstream
    # Docker freezes at network-creation time. See #314 / the sn06 sync outage.
    # Public resolvers are backups: if the host forwarder is briefly down, the
    # resolver falls through to 1.1.1.1 then 8.8.8.8 so sync/OTA never blackhole.
    dns:
      - 172.18.0.1
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "8090:8090"
    environment:
      DATA_DIR: "/opt/aquila"
      PROFILE_DIR: "/opt/aquila/profiles"
      RESULTS_PATH: "/opt/aquila/results/results.json"
      CONFIG_DIR: "/opt/aquila/config"
      KIOSK_CONTROL_URL: "http://host.docker.internal:9191"
      WATCHTOWER_URL: "http://aquila-watchtower:8080"
      RUNNING_IMAGE_DIGEST: "${RUNNING_IMAGE_DIGEST:-}"
      RUNNING_IMAGE_DIGEST_UI: "${RUNNING_IMAGE_DIGEST_UI:-}"
    volumes:
      - /opt/aquila/results:/opt/aquila/results
      - /opt/aquila/logs:/opt/aquila/logs
      - /opt/aquila/profiles:/opt/aquila/profiles
      - /opt/aquila/config:/opt/aquila/config
      # Persist the sync outbox (/opt/aquila/data/db/app.db): it queues completed
      # runs not yet pushed to the cloud. Without a host-backed mount it lives in
      # the container and every recreate (update / --force-recreate) silently
      # discards unsynced runs. The on-device schema migrates in place (#305).
      - /opt/aquila/data:/opt/aquila/data
      # Mount the whole fleet dir (not just .env) so the OTA reboot sentinel
      # /opt/fleet/last_update.json is host-backed and survives the Watchtower
      # container swap. See specs/backend/spec_ota_sentinel_persistent_volume.md.
      - /opt/fleet:/opt/fleet
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0"
      - "/dev/i2c-1:/dev/i2c-1"
      - "/dev/spidev0.0:/dev/spidev0.0"
      - "/dev/spidev0.1:/dev/spidev0.1"
      - "/dev/gpiomem:/dev/gpiomem"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    privileged: true
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1024M

  app:
    image: ghcr.io/${GHCR_REPO:-acorngenetics/aquilla-main}-api:${IMAGE_TAG}
    env_file: ${DEVICE_ENV_FILE:-/opt/aquila/config/device.env}
    container_name: aquila-app
    hostname: ${DEVICE_HOSTNAME}
    # See backend: host forwarder first, public backups. Cert renewal resolves
    # renew.cloud.acorngenetics.com from here (#314).
    dns:
      - 172.18.0.1
      - 1.1.1.1
      - 8.8.8.8
    command: ["python3", "application.py"]
    environment:
      DATA_DIR: "/opt/aquila"
      PROFILE_DIR: "/opt/aquila/profiles"
      RESULTS_PATH: "/opt/aquila/results/results.json"
      CONFIG_DIR: "/opt/aquila/config"
      BACKEND_URL: "http://aquila-backend:8090"
      KIOSK_CONTROL_URL: "http://host.docker.internal:9191"
    volumes:
      - /opt/aquila/results:/opt/aquila/results
      - /opt/aquila/logs:/opt/aquila/logs
      - /opt/aquila/profiles:/opt/aquila/profiles
      - /opt/aquila/config:/opt/aquila/config
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0"
      - "/dev/i2c-1:/dev/i2c-1"
      - "/dev/spidev0.0:/dev/spidev0.0"
      - "/dev/spidev0.1:/dev/spidev0.1"
      - "/dev/gpiomem:/dev/gpiomem"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    pid: host
    privileged: true
    healthcheck:
      disable: true
    depends_on:
      - backend
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M

  ui:
    image: ghcr.io/${GHCR_REPO:-acorngenetics/aquilla-main}-ui:${IMAGE_TAG}
    env_file: ${DEVICE_ENV_FILE:-/opt/aquila/config/device.env}
    container_name: aquila-ui
    ports:
      - "8080:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  watchtower:
    image: nickfedor/watchtower
    container_name: aquila-watchtower
    # Watchtower pulls from ghcr.io; the broken container DNS that stopped Sync
    # also blocks OTA. Host forwarder first, public backups (#314).
    dns:
      - 172.18.0.1
      - 1.1.1.1
      - 8.8.8.8
    env_file: ${DEVICE_ENV_FILE:-/opt/aquila/config/device.env}
    ports:
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json:ro
    environment:
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_HTTP_API_UPDATE: "true"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_CONFIG_FILE: "/config.json"
    command: --label-enable --http-api-update --cleanup --api-version 1.54
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  # Pin the default network's subnet/gateway so the host-side DNS forwarder is
  # reachable at a deterministic address (172.18.0.1 == the gateway) on every
  # device. Docker otherwise auto-assigns bridge subnets in creation order, so
  # the gateway would vary device-to-device and the pinned dns: entry would be
  # wrong. See #314.
  default:
    ipam:
      config:
        - subnet: 172.18.0.0/16
          gateway: 172.18.0.1
