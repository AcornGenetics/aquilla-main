# NOTE: This file is NOT used in any deployment.
# All devices (dev, pilot, prod) download and run fleet-config/docker-compose.yml
# via deployment2.sh. This file is a legacy leftover and can be ignored.

services:
  backend:
    image: ghcr.io/${GHCR_REPO:-acorngenetics/sentri}-api:${IMAGE_TAG:-latest}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "8090:8090"
    environment:
      DEVICE_ID: "${DEVICE_ID}"
      RUN_MODE: "${RUN_MODE}"
      KIOSK_CONTROL_URL: "http://host.docker.internal:9191"
      DATA_DIR: "/opt/aquila"
      PROFILE_DIR: "/opt/aquila/profiles"
      RESULTS_PATH: "/opt/aquila/results/results.json"
    volumes:
      - ../data/results:/opt/aquila/results
      - ../data/logs:/opt/aquila/logs
      - ../data/profiles:/opt/aquila/profiles
      - ../data/config:/opt/aquila/config
    devices:
      - "/dev/ttyACM0:/dev/ttyACM0"
      - "/dev/i2c-1:/dev/i2c-1"
      - "/dev/spidev0.0:/dev/spidev0.0"
      - "/dev/spidev0.1:/dev/spidev0.1"
      - "/dev/gpiomem:/dev/gpiomem"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    privileged: true
    restart: unless-stopped

  ui:
    image: ghcr.io/${GHCR_REPO:-acorngenetics/sentri}-ui:${IMAGE_TAG:-latest}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "8080:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DEVICE_ID: "${DEVICE_ID}"
      RUN_MODE: "${RUN_MODE}"
    restart: unless-stopped
